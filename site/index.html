<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hardcode-replacer — find hardcoded colors, replace with variables</title>
  <meta name="description" content="CLI tool for finding hardcoded colors, Tailwind color classes, and extractable class patterns in codebases." />
  <meta property="og:title" content="hardcode-replacer" />
  <meta property="og:description" content="Find hardcoded colors. Replace with variables." />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f3a8;</text></svg>" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

<body>
  <!-- SVG filters for blur-dissolve effect -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="blur-h-sm" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="6,0" />
      </filter>
    </defs>
  </svg>

  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
